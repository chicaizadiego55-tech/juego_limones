<!DOCTYPE html>
<html>
<head>
  <title>Caza Estrellas</title>
  <link rel="stylesheet" href="limones.css"/>
</head>

<body onload="iniciar()">

  <div class="contenedor">

    <header class="header">
      <h1>🍋 ATRAPA LIMONES</h1>
      <p class="subtitulo">Si del cielo te caen limones...</p>
      <h2 class="autor">Diego Chicaiza</h2>
    </header>

    <!-- HUD -->
    <div class="panel">
      <div class="hud-box">
        <span>PUNTAJE</span>
        <span id="txtPuntaje">0</span>
      </div>

      <div class="hud-box">
        <span>VIDAS</span>
        <span id="txtVidas">3</span>
      </div>
    </div>

    <!-- CANVAS -->
    <div class="game-frame">
      <canvas id="areaJuego" width="600" height="400"></canvas>
    </div>

    <!-- CONTROLES -->
    <div class="botones">
      <button onclick="moverIzquierda()">⟵</button>
      <button onclick="reiniciar()" class="btn-reiniciar">⟳</button>
      <button onclick="moverDerecha()">⟶</button>
    </div>

  </div>

  <script src="limones.js"></script>
  <script src="utils.js"></script>
</body>
<div class="fondo">
  <img src="images.png" alt="fondo gaming">
</div>
</html>
